<!DOCTYPE html>
<html>
<head>
<title>Efootball Gacha Trick Generator</title>

<style>

body{
    font-family:Arial;
    text-align:center;
    margin-top:100px;
}

button{
    padding:12px 30px;
    font-size:18px;
    cursor:pointer;
}

.slot{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:40px;
}

.card{
    width:80px;
    height:100px;
    border:3px solid #333;
    border-radius:10px;
    font-size:40px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#f5f5f5;
}

#arah{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}

</style>
</head>

<body>

<h2>🎰 EFootball Gacha Trick Generator</h2>

<button onclick="startGacha()">Generate</button>

<div class="slot">
<div class="card" id="c1">?</div>
<div class="card" id="c2">?</div>
<div class="card" id="c3">?</div>
</div>

<div id="arah"></div>

<script>

let interval1, interval2, interval3

function randomNum(){
    return Math.floor(Math.random()*3)+1
}

function startGacha(){

    arah.innerHTML=""

    interval1=setInterval(()=>{c1.innerHTML=randomNum()},80)
    interval2=setInterval(()=>{c2.innerHTML=randomNum()},80)
    interval3=setInterval(()=>{c3.innerHTML=randomNum()},80)

    // hasil final
    let a=randomNum()
    let b=randomNum()
    let c=randomNum()

    let arahList=["kiri → kanan","kanan → kiri"]
    let arahFinal=arahList[Math.floor(Math.random()*2)]

    setTimeout(()=>{
        clearInterval(interval1)
        c1.innerHTML=a
    },1000)

    setTimeout(()=>{
        clearInterval(interval2)
        c2.innerHTML=b
    },1600)

    setTimeout(()=>{
        clearInterval(interval3)
        c3.innerHTML=c
        arah.innerHTML="Arah: "+arahFinal
    },2200)

}

</script>

</body>
</html>
